---
description: Pipeline for processing Tenable Vulnerability Management scanner logs.
processors:
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - set:
      field: ecs.version
      value: '8.11.0'
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - set:
      field: event.category
      value: [configuration]
      
  # drop events generated by the CEL program to facilitate immediate reruns
  - drop:
      tag: drop
      if: ctx.event?.reason == "want_more"

  - set:
      field: event.type
      value: [info]
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      if: 'ctx.event?.original != null'
      description: 'The `message` field is no longer required if the document has an `event.original` field.'
  - json:
      field: event.original
      target_field: json
  - set:
      field: event.kind
      value: state
  - date:
      field: json.creation_date
      target_field: json.creation_date
      if: ctx.json?.creation_date != null && ctx.json.creation_date != ''
      formats:
        - UNIX
  - date:
      field: json.last_modification_date
      target_field: json.last_modification_date
      if: ctx.json?.last_modification_date != null && ctx.json.last_modification_date != ''
      formats:
        - UNIX
  - date:
      field: json.starttime
      target_field: json.starttime
      if: ctx.json?.starttime != null && ctx.json.starttime != ''
      formats:
        - yyyyMMdd'T'HHmmss
  - date:
      field: json.scan_details.info.scan_start
      target_field: json.scan_details.info.scan_start
      if: ctx.json?.scan_details?.info?.scan_start != null && ctx.json.scan_details.info.scan_start != ''
      formats:
        - UNIX
  - date:
      field: json.scan_details.info.scan_end
      target_field: json.scan_details.info.scan_end
      if: ctx.json?.scan_details?.info?.scan_end != null && ctx.json.scan_details.info.scan_end != ''
      formats:
        - UNIX
  - date:
      field: json.scan_details.info.timestamp
      target_field: json.scan_details.info.timestamp
      if: ctx.json?.scan_details?.info?.timestamp != null && ctx.json.scan_details.info.timestamp != ''
      formats:
        - UNIX
  - foreach:
      field: json.scan_details.history
      ignore_missing: true
      processor:
        date:
          field: _ingest._value.creation_date
          target_field: _ingest._value.creation_date
          formats:
            - UNIX
          ignore_failure: true
  - foreach:
      field: json.scan_details.history
      ignore_missing: true
      processor:
        date:
          field: _ingest._value.last_modification_date
          target_field: _ingest._value.last_modification_date
          formats:
            - UNIX
          ignore_failure: true
  - remove:
      field: json.scan_details.filters
      ignore_missing: true
  - rename:
      field: json
      target_field: tenable_io.scan
      ignore_missing: true
  - script:
      description: Drops null/empty values recursively.
      lang: painless
      source: |
        boolean dropEmptyFields(Object object) {
          if (object == null || object == '') {
            return true;
          } else if (object instanceof Map) {
            ((Map) object).values().removeIf(value -> dropEmptyFields(value));
            return (((Map) object).size() == 0);
          } else if (object instanceof List) {
            ((List) object).removeIf(value -> dropEmptyFields(value));
            return (((List) object).length == 0);
          }
          return false;
        }
        dropEmptyFields(ctx);
on_failure:
  - append:
      field: error.message
      value: '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
