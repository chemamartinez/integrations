services:
  sailpoint:
    image: docker.elastic.co/observability/stream:v0.18.0
    hostname: sailpoint
    ports:
      - 8080
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8080'
    command:
      - http-server
      - --addr=:8080
      - --config=/files/config.yml
  sailpoint-identities:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: sailpoint-identities
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8090'
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config-identities.yml
