---
description: Pipeline for processing SailPoint Identity Security Cloud identity records.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.4.0'

  # --- CEL input only ---
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  # --- end CEL-only ---

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null

  # Parse JSON from event.original
  - json:
      field: event.original
      target_field: json
      tag: parse_json
      if: ctx.event?.original != null

  # --- ECS categorization (static for all identity records) ---
  - set:
      field: event.kind
      tag: set_event_kind
      value: asset
  - append:
      field: event.category
      tag: append_event_category_iam
      value: iam
      allow_duplicates: false
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
      allow_duplicates: false

  # --- Timestamps ---
  - date:
      field: json.modified
      tag: parse_timestamp_modified
      target_field: '@timestamp'
      formats:
        - ISO8601
      if: ctx.json?.modified != null
      on_failure:
        - remove:
            field: json.modified
            ignore_missing: true
            tag: remove_invalid_modified
        - append:
            field: error.message
            tag: append_error_modified
            value: >-
              Processor {{{_ingest.on_failure_processor_type}}}
              with tag '{{{_ingest.on_failure_processor_tag}}}'
              failed: {{{_ingest.on_failure_message}}}
  - date:
      field: json.created
      tag: parse_event_created
      target_field: event.created
      formats:
        - ISO8601
      if: ctx.json?.created != null
      on_failure:
        - remove:
            field: json.created
            ignore_missing: true
            tag: remove_invalid_created
        - append:
            field: error.message
            tag: append_error_created
            value: >-
              Processor {{{_ingest.on_failure_processor_type}}}
              with tag '{{{_ingest.on_failure_processor_tag}}}'
              failed: {{{_ingest.on_failure_message}}}

  # --- Core user ECS fields ---
  - rename:
      field: json.id
      target_field: user.id
      tag: rename_user_id
      ignore_missing: true
  - rename:
      field: json.name
      target_field: user.name
      tag: rename_user_name
      ignore_missing: true
  - rename:
      field: json.displayName
      target_field: user.full_name
      tag: rename_user_full_name
      ignore_missing: true
  - rename:
      field: json.email
      target_field: user.email
      tag: rename_user_email
      ignore_missing: true

  # Extract user.domain from user.email (split on @, take [1])
  - dissect:
      field: user.email
      tag: dissect_user_domain
      pattern: '%{?user_local}@%{user.domain}'
      ignore_missing: true
      ignore_failure: true

  # user.roles — access[] where type == "ROLE", extract .name
  - script:
      lang: painless
      tag: set_user_roles
      description: Extract role names from access array where type == ROLE.
      if: ctx.json?.access instanceof List
      source: |-
        def roles = new ArrayList();
        for (def item : ctx.json.access) {
          if (item.containsKey('type') && item.type == 'ROLE' && item.containsKey('name')) {
            roles.add(item.name);
          }
        }
        if (roles.size() > 0) {
          ctx.user = ctx.user ?: new HashMap();
          ctx.user.roles = roles;
        }

  # user.group.name — from visibleSegments array
  - foreach:
      field: json.visibleSegments
      tag: foreach_visible_segments
      if: ctx.json?.visibleSegments instanceof List
      ignore_missing: true
      processor:
        append:
          field: user.group.name
          tag: append_user_group_name
          value: '{{{_ingest._value}}}'
          allow_duplicates: false

  # user.group.name — from attributes.department
  - append:
      field: user.group.name
      tag: append_user_group_department
      value: '{{{json.attributes.department}}}'
      allow_duplicates: false
      if: ctx.json?.attributes?.department != null

  # user.group.name — from access[] memberOf entitlement DNs (extract CN = first RDN)
  - script:
      lang: painless
      tag: set_user_group_from_memberof
      description: Append AD group CN (from access[] memberOf entitlement DNs) to user.group.name.
      if: ctx.json?.access instanceof List
      source: |-
        if (ctx.user == null) { ctx.user = new HashMap(); }
        if (ctx.user.group == null) { ctx.user.group = new HashMap(); }
        def names = ctx.user.group.name;
        if (names == null) { names = new ArrayList(); }
        else if (!(names instanceof List)) { def t = new ArrayList(); t.add(names); names = t; }
        for (def item : ctx.json.access) {
          if (item != null && item.get('attribute') == 'memberOf' && item.get('value') instanceof String) {
            def val = item.value;
            if (val.startsWith('CN=')) {
              def comma = val.indexOf(',');
              def cn = comma > 0 ? val.substring(3, comma) : val.substring(3);
              if (!names.contains(cn)) { names.add(cn); }
            }
          }
        }
        if (names.size() > 0) { ctx.user.group.name = names; }

  # --- Entity fields ---
  - set:
      field: user.entity.id
      tag: set_entity_id
      copy_from: user.id
      if: ctx.user?.id != null
  - set:
      field: user.entity.name
      tag: set_entity_name
      copy_from: user.full_name
      if: ctx.user?.full_name != null
  - append:
      field: user.entity.type
      tag: append_entity_type
      value: user
      allow_duplicates: false

  # --- Entity relationships: owns (entitlements, accessProfiles, roles, apps, governanceGroups) ---
  # and administers (sources)
  # owns may be a List (legacy search API format) or a Map (current search API format).
  - script:
      lang: painless
      tag: build_entity_relationships
      description: >-
        Build user.entity.relationships.owns and user.entity.relationships.administers
        from the owns field, which may be a list of category wrappers (legacy) or a
        map keyed by category name (current API format).
      if: ctx.json?.owns != null
      source: |-
        def ownsIds = new ArrayList();
        def ownsNames = new ArrayList();
        def adminIds = new ArrayList();
        def adminNames = new ArrayList();
        def ownsSubs = ['entitlements', 'accessProfiles', 'roles', 'apps', 'governanceGroups'];
        if (ctx.json.owns instanceof List) {
          for (def ownsItem : ctx.json.owns) {
            for (def subKey : ownsSubs) {
              if (ownsItem.containsKey(subKey) && ownsItem[subKey] instanceof List) {
                for (def ref : ownsItem[subKey]) {
                  if (ref != null) {
                    if (ref.containsKey('id')) { ownsIds.add(ref.id); }
                    if (ref.containsKey('name')) { ownsNames.add(ref.name); }
                  }
                }
              }
            }
            if (ownsItem.containsKey('sources') && ownsItem.sources instanceof List) {
              for (def ref : ownsItem.sources) {
                if (ref != null) {
                  if (ref.containsKey('id')) { adminIds.add(ref.id); }
                  if (ref.containsKey('name')) { adminNames.add(ref.name); }
                }
              }
            }
          }
        } else {
          def owns = ctx.json.owns;
          for (def subKey : ownsSubs) {
            if (owns.containsKey(subKey) && owns[subKey] instanceof List) {
              for (def ref : owns[subKey]) {
                if (ref != null) {
                  if (ref.containsKey('id')) { ownsIds.add(ref.id); }
                  if (ref.containsKey('name')) { ownsNames.add(ref.name); }
                }
              }
            }
          }
          if (owns.containsKey('sources') && owns.sources instanceof List) {
            for (def ref : owns.sources) {
              if (ref != null) {
                if (ref.containsKey('id')) { adminIds.add(ref.id); }
                if (ref.containsKey('name')) { adminNames.add(ref.name); }
              }
            }
          }
        }
        if (ctx.user == null) { ctx.user = new HashMap(); }
        if (ctx.user.entity == null) { ctx.user.entity = new HashMap(); }
        if (ctx.user.entity.relationships == null) { ctx.user.entity.relationships = new HashMap(); }
        if (ownsIds.size() > 0 || ownsNames.size() > 0) {
          def ownsService = new HashMap();
          if (ownsIds.size() > 0) { ownsService.put('id', ownsIds); }
          if (ownsNames.size() > 0) { ownsService.put('name', ownsNames); }
          def ownsObj = new HashMap();
          ownsObj.put('service', ownsService);
          ctx.user.entity.relationships.put('owns', ownsObj);
        }
        if (adminIds.size() > 0 || adminNames.size() > 0) {
          def adminService = new HashMap();
          if (adminIds.size() > 0) { adminService.put('id', adminIds); }
          if (adminNames.size() > 0) { adminService.put('name', adminNames); }
          def adminObj = new HashMap();
          adminObj.put('service', adminService);
          ctx.user.entity.relationships.put('administers', adminObj);
        }

  # --- Entity relationships: supervises (direct reports, populated by CEL when isManager == true) ---
  - rename:
      field: json._supervises
      target_field: user.entity.relationships.supervises
      tag: rename_supervises
      ignore_missing: true
      if: ctx.json?._supervises != null
  - remove:
      field: json._supervises
      tag: remove_supervises_placeholder
      ignore_missing: true

  # --- related.user ---
  - append:
      field: related.user
      tag: append_related_user_name
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.user
      tag: append_related_user_full_name
      value: '{{{user.full_name}}}'
      allow_duplicates: false
      if: ctx.user?.full_name != null
  - append:
      field: related.user
      tag: append_related_user_manager_name
      value: '{{{json.manager.name}}}'
      allow_duplicates: false
      if: ctx.json?.manager?.name != null

  # --- Custom namespace fields: sailpoint_identity_sc.identity.* ---
  - rename:
      field: json.employeeNumber
      target_field: sailpoint_identity_sc.identity.employee_number
      tag: rename_employee_number
      ignore_missing: true
  - rename:
      field: json.identityProfile.id
      target_field: sailpoint_identity_sc.identity.identity_profile.id
      tag: rename_identity_profile_id
      ignore_missing: true
  - rename:
      field: json.identityProfile.name
      target_field: sailpoint_identity_sc.identity.identity_profile.name
      tag: rename_identity_profile_name
      ignore_missing: true
  - rename:
      field: json.isManager
      target_field: sailpoint_identity_sc.identity.is_manager
      tag: rename_is_manager
      ignore_missing: true
  - rename:
      field: json.status
      target_field: sailpoint_identity_sc.identity.status
      tag: rename_status
      ignore_missing: true
  - rename:
      field: json.inactive
      target_field: sailpoint_identity_sc.identity.inactive
      tag: rename_inactive
      ignore_missing: true
  - rename:
      field: json.protected
      target_field: sailpoint_identity_sc.identity.protected
      tag: rename_protected
      ignore_missing: true
  - rename:
      field: json.disabled
      target_field: sailpoint_identity_sc.identity.disabled
      tag: rename_disabled
      ignore_missing: true
  - rename:
      field: json.locked
      target_field: sailpoint_identity_sc.identity.locked
      tag: rename_locked
      ignore_missing: true
  - rename:
      field: json.source.id
      target_field: sailpoint_identity_sc.identity.source.id
      tag: rename_source_id
      ignore_missing: true
  - rename:
      field: json.source.name
      target_field: sailpoint_identity_sc.identity.source.name
      tag: rename_source_name
      ignore_missing: true
  - rename:
      field: json.attributes
      target_field: sailpoint_identity_sc.identity.attributes
      tag: rename_attributes
      ignore_missing: true
  - rename:
      field: json.accountCount
      target_field: sailpoint_identity_sc.identity.account_count
      tag: rename_account_count
      ignore_missing: true
  - rename:
      field: json.accessCount
      target_field: sailpoint_identity_sc.identity.access_count
      tag: rename_access_count
      ignore_missing: true
  - rename:
      field: json.entitlementCount
      target_field: sailpoint_identity_sc.identity.entitlement_count
      tag: rename_entitlement_count
      ignore_missing: true
  - rename:
      field: json.roleCount
      target_field: sailpoint_identity_sc.identity.role_count
      tag: rename_role_count
      ignore_missing: true
  - rename:
      field: json.accessProfileCount
      target_field: sailpoint_identity_sc.identity.access_profile_count
      tag: rename_access_profile_count
      ignore_missing: true
  - rename:
      field: json.ownsCount
      target_field: sailpoint_identity_sc.identity.owns_count
      tag: rename_owns_count
      ignore_missing: true
  - rename:
      field: json.visibleSegments
      target_field: sailpoint_identity_sc.identity.visible_segments
      tag: rename_visible_segments
      ignore_missing: true
  - rename:
      field: json.pod
      target_field: sailpoint_identity_sc.identity.pod
      tag: rename_pod
      ignore_missing: true
  - rename:
      field: json.org
      target_field: sailpoint_identity_sc.identity.org
      tag: rename_org
      ignore_missing: true
  - rename:
      field: json.tags
      target_field: sailpoint_identity_sc.identity.tags
      tag: rename_tags
      ignore_missing: true
  - rename:
      field: json.manager.id
      target_field: sailpoint_identity_sc.identity.manager.id
      tag: rename_manager_id
      ignore_missing: true
  - rename:
      field: json.manager.name
      target_field: sailpoint_identity_sc.identity.manager.name
      tag: rename_manager_name
      ignore_missing: true
  - rename:
      field: json.manager.displayName
      target_field: sailpoint_identity_sc.identity.manager.display_name
      tag: rename_manager_display_name
      ignore_missing: true
  - rename:
      field: json.accounts
      target_field: sailpoint_identity_sc.identity.accounts
      tag: rename_accounts
      ignore_missing: true
  - rename:
      field: json.apps
      target_field: sailpoint_identity_sc.identity.apps
      tag: rename_apps
      ignore_missing: true
  - rename:
      field: json.access
      target_field: sailpoint_identity_sc.identity.access
      tag: rename_access
      ignore_missing: true
  - rename:
      field: json.owns
      target_field: sailpoint_identity_sc.identity.owns
      tag: rename_owns
      ignore_missing: true

  # Handle nullable processingState — only set if non-null
  - rename:
      field: json.processingState
      target_field: sailpoint_identity_sc.identity.processing_state
      tag: rename_processing_state
      if: ctx.json?.processingState != null
      ignore_missing: true

  # --- Cleanup ---
  - remove:
      field: json
      tag: remove_json
      ignore_missing: true
  - append:
      field: tags
      tag: append_preserve_original_event_on_error
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null

on_failure:
  - append:
      field: error.message
      tag: append_pipeline_error_message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      tag: append_preserve_original_event_on_failure
      value: preserve_original_event
      allow_duplicates: false
