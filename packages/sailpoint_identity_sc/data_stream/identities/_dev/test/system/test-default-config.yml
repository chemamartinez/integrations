wait_for_data_timeout: 1m
input: cel
service: sailpoint-identities
vars:
  api_version: v2026
  client_id: test-client-id
  client_secret: test-client-secret
  api_host: http://{{Hostname}}:{{Port}}
  token_scopes:
    - sp:scopes:all
data_stream:
  vars:
    interval: 2s
    batch_size: 2
    preserve_original_event: true
    tags:
      - forwarded
      - sailpoint_identity_sc.identities
assert:
  # Round 1: Page 1 (2) + Page 2 (2) + Terminal page (1) = 5 events
  # Round 2: cursor resume (1 event)
  # Total: 6 events
  hit_count: 6
