# Below are the fields that are on the ECS RFC or obtained from the entity-analytics input provider.
# https://github.com/elastic/ecs/pull/2215/files?short_path=8adb310#diff-8adb310e2e999dfbc367080c85348dba3235fde4f30afaecc42fecc20f55aa82
- name: host
  type: group
  fields:
    - name: entity
      type: group
      fields:
        - name: attributes
          type: group
          fields:
            - name: managed
              type: boolean
        - name: lifecycle
          type: group
          fields:
            - name: last_activity
              type: date
- name: asset
  type: group
  fields:
    - name: category
      type: keyword
    - name: first_seen
      type: date
    - name: group
      type: group
      fields:
        - name: id
          type: keyword
        - name: name
          type: keyword
    - name: id
      type: keyword
    - name: is_managed
      type: boolean
    - name: last_seen
      type: date
    - name: last_updated
      type: date
    - name: model
      type: keyword
    - name: name
      type: keyword
    - name: status
      type: keyword
    - name: tags
      type: keyword
    - name: type
      type: keyword
    - name: vendor
      type: keyword
    - name: version
      type: keyword
- name: device
  type: group
  fields:
    - name: group
      type: group
      fields:
        - name: id
          type: keyword
        - name: name
          type: keyword
    - name: registered_owners
      type: group
      fields:
        - name: business_phones
          type: keyword
        - name: display_name
          type: keyword
        - name: given_name
          type: keyword
        - name: id
          type: keyword
        - name: job_title
          type: keyword
        - name: mail
          type: keyword
        - name: mobile_phone
          type: keyword
        - name: surname
          type: keyword
        - name: user_principal_name
          type: keyword
    - name: registered_users
      type: group
      fields:
        - name: business_phones
          type: keyword
        - name: display_name
          type: keyword
        - name: given_name
          type: keyword
        - name: id
          type: keyword
        - name: job_title
          type: keyword
        - name: mail
          type: keyword
        - name: mobile_phone
          type: keyword
        - name: surname
          type: keyword
        - name: user_principal_name
          type: keyword
- name: labels
  type: group
  fields:
    - name: identity_source
      type: keyword
- name: user
  type: group
  fields:
    - name: entity
      type: group
      fields:
        - name: attributes
          type: group
          fields:
            - name: mfa_enabled
              type: boolean
            - name: permissions
              type: keyword
        - name: lifecycle
          type: group
          fields:
            - name: last_activity
              type: date
        - name: relationships
          type: group
          fields:
            - name: supervises
              type: group
              fields:
                - name: email
                  type: keyword
                - name: user.id
                  type: keyword
                - name: user.name
                  type: keyword
    - name: enabled
      type: boolean
    - name: first_name
      type: keyword
    - name: group
      type: group
      fields:
        - name: id
          type: keyword
        - name: name
          type: keyword
    - name: job_title
      type: keyword
    - name: last_name
      type: keyword
    - name: phone
      type: keyword
    - name: work
      type: group
      fields:
        - name: location_name
          type: keyword
